# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: EspToolkit
version: "1.1.18"
slug: esptoolkit_addon
description: Runs ESPHome and exposes compile/upload/validate via REST API and MCP. Installs the EspToolkit integration (Designer + API services) into Home Assistant.
url: "https://github.com/postsi/ESPHomeToolkit"
arch:
  - aarch64
  - amd64
init: false
ports:
  8098/tcp: 8098
map:
  - config:rw
  - ssl:ro
  - addons:rw
  - backup:rw
  - share:rw
  - data:rw
options:
  api_token: ""
  port: 8098
  ha_base_url: ""
  ha_token: ""
schema:
  api_token: str
  port: int
  ha_base_url: str?
  ha_token: str?
ingress: true
ingress_port: 8098
startup: application
boot: auto
host_network: false
# Same as official ESPHome add-on: allow USB serial (ttyUSB/ttyACM) for compile/upload from the HA host.
uart: true
# hassio_role: manager required for supervisor_store_reload (POST /store/reload); default role only allows /info
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: false
full_access: false
image: "ghcr.io/postsi/esptoolkit-addon-{arch}"
