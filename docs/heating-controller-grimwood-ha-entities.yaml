# -----------------------------------------------------------------------------
# Interval: replace the stock block — same widget ids, HA-backed sensors
# -----------------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_all_current
          text: !lambda |-
            if (id(ha_all_current).has_state()) {
              char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_all_current).state); return std::string(buf);
            }
            return std::string("--°");
      - lvgl.label.update:
          id: lbl_all_target
          text: !lambda |-
            if (id(ha_all_setpoint).has_state()) {
              char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_all_setpoint).state); return std::string(buf);
            }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_all
          value: !lambda |-
            if (!id(ha_all_setpoint).has_state()) return 40;
            return (int)(id(ha_all_setpoint).state * 2.0f);
      - lvgl.label.update:
          id: lbl_z1_temp
          text: !lambda |-
            if (id(ha_z1_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z1_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_z1
          value: !lambda |-
            if (!id(ha_z1_setpoint).has_state()) return 20;
            return (int)id(ha_z1_setpoint).state;
      - lvgl.label.update:
          id: lbl_z2_temp
          text: !lambda |-
            if (id(ha_z2_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z2_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_z2
          value: !lambda |-
            if (!id(ha_z2_setpoint).has_state()) return 20;
            return (int)id(ha_z2_setpoint).state;
      - lvgl.label.update:
          id: lbl_z3_temp
          text: !lambda |-
            if (id(ha_z3_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z3_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_z3
          value: !lambda |-
            if (!id(ha_z3_setpoint).has_state()) return 20;
            return (int)id(ha_z3_setpoint).state;
      - lvgl.label.update:
          id: lbl_z4_temp
          text: !lambda |-
            if (id(ha_z4_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z4_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_z4
          value: !lambda |-
            if (!id(ha_z4_setpoint).has_state()) return 20;
            return (int)id(ha_z4_setpoint).state;
      - lvgl.label.update:
          id: lbl_z5_temp
          text: !lambda |-
            if (id(ha_z5_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z5_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
          id: arc_z5
          value: !lambda |-
            if (!id(ha_z5_setpoint).has_state()) return 20;
            return (int)id(ha_z5_setpoint).state;
      - lvgl.label.update:
          id: lbl_z6_temp
          text: !lambda |-
            if (id(ha_z6_current).has_state()) { char buf[16]; snprintf(buf, sizeof(buf), "%.1f°", id(ha_z6_current).state); return std::string(buf); }
            return std::string("--°");
      - lvgl.arc.update:
