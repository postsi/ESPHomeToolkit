            temperature: !lambda |-
              float t = id(ha_z3_setpoint).state + 0.5f;
              if (t > 28.0f) t = 28.0f;
              return t;
  - id: script_z3_dec
    then:
      - homeassistant.action:
          action: climate.set_temperature
          data:
            entity_id: ${eid_z3}
            temperature: !lambda |-
