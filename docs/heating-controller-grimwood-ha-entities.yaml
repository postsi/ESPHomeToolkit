            if (!id(ha_z6_setpoint).has_state()) return 20;
            return (int)id(ha_z6_setpoint).state;

# -----------------------------------------------------------------------------
# LVGL: replace ONLY each arc’s on_release (same ids as stock file)
# Paste into your lvgl: widgets — remove the old climate.control blocks.
#
# arc_all (min 30 max 56, setpoint °C = arc value / 2):
#   on_release:
#     - homeassistant.action:
#         action: climate.set_temperature
#         data:
#           entity_id: ${eid_all}
#           temperature: !lambda return x / 2.0;
#
# arc_z1 … arc_z6 (min 15 max 28, setpoint °C = x):
#   on_release:
#     - homeassistant.action:
#         action: climate.set_temperature
#         data:
#           entity_id: ${eid_z1}   # use z2…z6 for other arcs
#           temperature: !lambda return x;
#
# -----------------------------------------------------------------------------
# Optional: stock `climate:` heat_action recoloured arcs from DEVICE climate state.
# With HA-only climates you do NOT get that for free. Options:
#   • Add homeassistant sensors for an attribute that reflects heating (if any)
#     and extend interval with lvgl.arc.update indicator colour, or
#   • Skip arc recolour until you want to add that logic.
# =============================================================================
